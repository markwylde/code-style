services:
  api:
    build:
      context: .
      target: api-dev
    command: npm run dev --workspace=@code-style/example-api
    environment:
      TODO_API_PORT: 4001
      TODO_API_PUBLIC_BASE_URL: http://127.0.0.1:4001
      TODO_API_MAX_BODY_BYTES: 102400
    ports:
      - "4001:4001"
    develop:
      watch:
        - action: sync
          path: ./services/api/src
          target: /app/services/api/src
          initial_sync: true
        - action: sync
          path: ./services/api/tests
          target: /app/services/api/tests
          initial_sync: true
        - action: sync+restart
          path: ./services/api/.env.example
          target: /app/services/api/.env.example
          initial_sync: true
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./services/api/package.json
        - action: rebuild
          path: ./Dockerfile
